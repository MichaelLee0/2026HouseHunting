  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

button onclick=\"{{ closeDialog }}\" style=\"flex:0 0 auto; border:2px solid #ece3d8; background:#fff; color:#6b625c; font-family:inherit; font-weight:800; font-size:15px; padding:13px 22px; border-radius:15px; cursor:pointer;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ submit }}\" style=\"{{ submitStyle }}\">{{ submitLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;showLabels&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Map&quot;},&quot;startZoom&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:9,&quot;min&quot;:7,&quot;max&quot;:13,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Map&quot;}}\">\nclass Component extends DCLogic {\n  emptyForm() {\n    return { address: '', pickedLat: null, pickedLng: null, url: '', agentEmail: '', agentPhone: '', price: '', beds: 1, baths: 1, distWork: { ok: true, text: '' }, distGrocery: { ok: true, text: '' }, amenities: { wifi: false, parking: false, pool: false, pets: false }, photos: [], michael: 0, anna: 0, notes: '', status: 'possible' };\n  }\n\n  state = { rentals: [], loaded: false, dialogOpen: false, editingId: null, panelOpen: true, geocoding: false, geoError: '', dirty: false, sortBy: 'default', filterStatus: 'all', suggestions: [], suggestLoading: false, addressFocused: false, form: this.emptyForm() };\n\n  visibleRentals() {\n    let list = this.state.rentals.slice();\n    if (this.state.filterStatus && this.state.filterStatus !== 'all') {\n      list = list.filter(r => (r.status || 'possible') === this.state.filterStatus);\n    }\n    if (this.state.sortBy === 'michael') list.sort((a, b) => (b.michael || 0) - (a.michael || 0));\n    else if (this.state.sortBy === 'anna') list.sort((a, b) => (b.anna || 0) - (a.anna || 0));\n    return list;\n  }\n  setSort(v) { this.setState({ sortBy: v }, () => this.syncMarkers()); }\n  setFilter(v) { this.setState({ filterStatus: v }, () => this.syncMarkers()); }\n\n  componentDidMount() {\n    this.baseline = [];\n    this.markers = {};\n    this._suggestSeq = 0;\n    this.waitLeaflet(() => { this.initMap(); this.loadData(); });\n  }\n\n  waitLeaflet(cb) {\n    if (window.L) { cb(); return; }\n    let n = 0;\n    const t = setInterval(() => {\n      if (window.L || n++ > 120) { clearInterval(t); if (window.L) cb(); }\n    }, 50);\n  }\n\n  initMap() {\n    if (!this.mapNode || this.map) return;\n    const zoom = this.props.startZoom != null ? this.props.startZoom : 9;\n    this.map = L.map(this.mapNode, { zoomControl: false, attributionControl: true }).setView([33.6846, -117.8265], zoom);\n    L.control.zoom({ position: 'bottomleft' }).addTo(this.map);\n    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: 'Imagery © Esri' }).addTo(this.map);\n    if (this.props.showLabels !== false) {\n      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, opacity: 0.9 }).addTo(this.map);\n    }\n    this.map.on('popupopen', (e) => {\n      const el = e.popup.getElement();\n      if (!el) return;\n      const btn = el.querySelector('.rm-edit-btn');\n      if (btn) btn.onclick = () => { const id = btn.getAttribute('data-id'); this.map.closePopup(); this.openEdit(id); };\n    });\n    setTimeout(() => { if (this.map) this.map.invalidateSize(); }, 250);\n    this.syncMarkers();\n  }\n\n  async loadData() {\n    let baseline = [];\n    let current = null;\n    try {\n      const jsonUrl = (window.__resources && window.__resources.rentalsJson) || 'rentals.json';\n      const r = await fetch(jsonUrl, { cache: 'no-store' });\n      if (r.ok) { const j = await r.json(); if (Array.isArray(j)) baseline = j; }\n    } catch (e) {}\n    try {\n      const ls = localStorage.getItem('rentalmap.rentals');\n      if (ls) { const j = JSON.parse(ls); if (Array.isArray(j)) current = j; }\n    } catch (e) {}\n    this.baseline = baseline;\n    const rentals = current || baseline;\n    const dirty = current ? JSON.stringify(current) !== JSON.stringify(baseline) : false;\n    this.setState({ rentals, loaded: true, dirty }, () => this.syncMarkers());\n  }\n\n  persist(rentals) {\n    try { localStorage.setItem('rentalmap.rentals', JSON.stringify(rentals)); } catch (e) {}\n    const dirty = JSON.stringify(rentals) !== JSON.stringify(this.baseline || []);\n    this.setState({ rentals, dirty }, () => this.syncMarkers());\n  }\n\n  escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;' }[c])); }\n  starStr(n) { let s = ''; for (let i = 1; i <= 5; i++) s += i <= (n || 0) ? '★' : '☆'; return s; }\n  statusMeta(k) { return ({ not: { label: 'Not an option', color: '#c2553a' }, possible: { label: 'Possible', color: '#b07d2e' }, very: { label: 'Very Possible', color: '#4e8a5c' } })[k] || { label: 'Possible', color: '#b07d2e' }; }\n  amenityList(a) { const o = []; if (a) { if (a.wifi) o.push('WiFi'); if (a.parking) o.push('Parking'); if (a.pool) o.push('Pool'); if (a.pets) o.push('Pets OK'); } return o; }\n\n  iconFor(r) {\n    const c = ({ not: '#c2553a', possible: '#e0a458', very: '#6fae7a' })[r.status] || '#e0a458';\n    return L.divIcon({ className: 'rm-pin', iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -30],\n      html: '<div style=\"width:28px;height:28px;background:' + c + ';border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 3px 9px rgba(0,0,0,.35);\"><\u002Fdiv>' });\n  }\n\n  popupFor(r) {\n    const st = this.statusMeta(r.status);\n    const am = this.amenityList(r.amenities);\n    const img = (r.photos && r.photos[0]) ? '<img src=\"' + r.photos[0] + '\" style=\"width:100%;height:120px;object-fit:cover;border-radius:11px;margin-bottom:9px;\">' : '';\n    const price = r.price ? '<div style=\"font-weight:900;font-size:14px;color:#3a3330;margin-bottom:8px;\">$' + this.escapeHtml(String(r.price).replace(/^\\$\\s*/, '')) + '<\u002Fdiv>' : '';\n    const w = r.distWork || {}, g = r.distGrocery || {};\n    const dist = [];\n    if (w.text && w.text.trim()) dist.push('<span style=\"color:' + (w.ok ? '#4e8a5c' : '#c2553a') + ';font-weight:700;\">' + (w.ok ? '✓' : '✗') + ' Work · ' + this.escapeHtml(w.text) + '<\u002Fspan>');\n    if (g.text && g.text.trim()) dist.push('<span style=\"color:' + (g.ok ? '#4e8a5c' : '#c2553a') + ';font-weight:700;\">' + (g.ok ? '✓' : '✗') + ' Grocery · ' + this.escapeHtml(g.text) + '<\u002Fspan>');\n    const distHtml = dist.length ? '<div style=\"display:flex;gap:10px;flex-wrap:wrap;font-size:11.5px;margin-bottom:8px;\">' + dist.join('') + '<\u002Fdiv>' : '';\n    return '<div style=\"font-family:Nunito,sans-serif;min-width:208px;max-width:240px;color:#3a3330;\">' + img +\n      '<div style=\"font-weight:900;font-size:15px;line-height:1.25;margin-bottom:3px;\">' + this.escapeHtml(r.address) + '<\u002Fdiv>' +\n      '<div style=\"font-size:12.5px;color:#9a8f86;font-weight:700;margin-bottom:8px;\">' + (r.beds || 0) + ' bd · ' + (r.baths || 0) + ' ba<\u002Fdiv>' +\n      price +\n      '<span style=\"display:inline-block;background:' + st.color + '22;color:' + st.color + ';font-weight:800;font-size:11px;padding:4px 10px;border-radius:999px;margin-bottom:9px;\">' + st.label + '<\u002Fspan>' +\n      (am.length ? '<div style=\"font-size:12px;color:#6b625c;font-weight:600;margin-bottom:8px;\">' + am.join(' · ') + '<\u002Fdiv>' : '') +\n      distHtml +\n      '<div style=\"font-size:12.5px;margin-bottom:3px;\"><b>Michael<\u002Fb> <span style=\"color:#e0a458;letter-spacing:1px;\">' + this.starStr(r.michael) + '<\u002Fspan><\u002Fdiv>' +\n      '<div style=\"font-size:12.5px;margin-bottom:' + (r.notes ? '8px' : '0') + ';\"><b>Anna<\u002Fb> <span style=\"color:#e0a458;letter-spacing:1px;\">' + this.starStr(r.anna) + '<\u002Fspan><\u002Fdiv>' +\n      (r.notes ? '<div style=\"font-size:12px;color:#9a8f86;font-style:italic;line-height:1.4;border-top:1px solid #f1eae0;padding-top:8px;\">' + this.escapeHtml(r.notes) + '<\u002Fdiv>' : '') +\n      ((r.agentEmail || r.agentPhone) ? '<div style=\"font-size:11.5px;color:#6b625c;font-weight:600;margin-top:8px;border-top:1px solid #f1eae0;padding-top:8px;\">' +\n        (r.agentEmail ? '<div style=\"margin-bottom:2px;\">✉ <a href=\"mailto:' + this.escapeHtml(r.agentEmail) + '\" style=\"color:#6b625c;\">' + this.escapeHtml(r.agentEmail) + '<\u002Fa><\u002Fdiv>' : '') +\n        (r.agentPhone ? '<div>☎ <a href=\"tel:' + this.escapeHtml(r.agentPhone) + '\" style=\"color:#6b625c;\">' + this.escapeHtml(r.agentPhone) + '<\u002Fa><\u002Fdiv>' : '') + '<\u002Fdiv>' : '') +\n      (r.url ? '<a href=\"' + this.escapeHtml(r.url) + '\" target=\"_blank\" rel=\"noopener\" style=\"display:block;text-align:center;margin-top:9px;background:#e07a5f;color:#fff;font-weight:800;font-size:12.5px;padding:9px;border-radius:11px;text-decoration:none;\">🔗 View listing<\u002Fa>' : '') +\n      '<button class=\"rm-edit-btn\" data-id=\"' + r.id + '\" style=\"margin-top:10px;width:100%;border:none;background:#fdeee9;color:#c2553a;font-family:Nunito,sans-serif;font-weight:800;font-size:12.5px;padding:9px;border-radius:11px;cursor:pointer;\">✎ Edit<\u002Fbutton>' +\n      '<\u002Fdiv>';\n  }\n\n  syncMarkers() {\n    if (!this.map || !window.L) return;\n    this.markers = this.markers || {};\n    const visible = this.visibleRentals();\n    const ids = new Set(visible.map(r => r.id));\n    Object.keys(this.markers).forEach(id => { if (!ids.has(id)) { this.map.removeLayer(this.markers[id]); delete this.markers[id]; } });\n    visible.forEach(r => {\n      if (r.lat == null || r.lng == null) return;\n      if (this.markers[r.id]) {\n        this.markers[r.id].setLatLng([r.lat, r.lng]).setIcon(this.iconFor(r)).setPopupContent(this.popupFor(r));\n      } else {\n        this.markers[r.id] = L.marker([r.lat, r.lng], { icon: this.iconFor(r) }).addTo(this.map).bindPopup(this.popupFor(r));\n      }\n    });\n  }\n\n  flyTo(id) {\n    const r = this.state.rentals.find(x => x.id === id);\n    if (r && this.map && r.lat != null) {\n      const zoom = Math.max(this.map.getZoom(), 13);\n      // Offset the center so the pin lands in the visible area (clear of the left panel) with room above for the popup.\n      const hOffset = this.state.panelOpen ? 180 : 0;\n      const target = this.map.project([r.lat, r.lng], zoom);\n      const center = this.map.unproject(target.subtract([hOffset, 40]), zoom);\n      this.map.flyTo(center, zoom, { duration: 0.8 });\n    }\n    const m = this.markers && this.markers[id];\n    if (m) setTimeout(() => m.openPopup(), 400);\n  }\n\n  removeRental(id) { this.persist(this.state.rentals.filter(r => r.id !== id)); }\n\n  // ---- dialog + form ----\n  openDialog() { this.setState({ dialogOpen: true, editingId: null, geoError: '', suggestions: [], suggestLoading: false, addressFocused: false, form: this.emptyForm() }); }\n  openEdit(id) {\n    const r = this.state.rentals.find(x => x.id === id);\n    if (!r) return;\n    this.editOrigAddress = r.address || '';\n    const form = {\n      address: r.address || (r.street != null ? r.street : ''),\n      pickedLat: r.lat != null ? r.lat : null, pickedLng: r.lng != null ? r.lng : null,\n      url: r.url || '', agentEmail: r.agentEmail || '', agentPhone: r.agentPhone || '', price: r.price || '',\n      beds: r.beds || 0, baths: r.baths || 0,\n      distWork: Object.assign({ ok: true, text: '' }, r.distWork || {}),\n      distGrocery: Object.assign({ ok: true, text: '' }, r.distGrocery || {}),\n      amenities: Object.assign({ wifi: false, parking: false, pool: false, pets: false }, r.amenities || {}),\n      photos: (r.photos || []).slice(),\n      michael: r.michael || 0, anna: r.anna || 0,\n      notes: r.notes || '', status: r.status || 'possible'\n    };\n    this.setState({ dialogOpen: true, editingId: id, geoError: '', suggestions: [], suggestLoading: false, addressFocused: false, form });\n  }\n  closeDialog() { this.setState({ dialogOpen: false, editingId: null, suggestions: [], addressFocused: false }); }\n  setForm(patch) { this.setState(s => ({ form: Object.assign({}, s.form, patch) })); }\n  onAddress(e) {\n    const v = e.target.value;\n    this.setForm({ address: v, pickedLat: null, pickedLng: null });\n    clearTimeout(this._suggestTimer);\n    if (!v || v.trim().length < 3) { this.setState({ suggestions: [], suggestLoading: false }); return; }\n    this.setState({ suggestLoading: true, addressFocused: true });\n    this._suggestTimer = setTimeout(() => this.fetchSuggestions(v.trim()), 350);\n  }\n  onAddressFocus() { this.setState({ addressFocused: true }); }\n  onAddressBlur() { setTimeout(() => this.setState({ addressFocused: false }), 160); }\n  async fetchSuggestions(q) {\n    const seq = ++this._suggestSeq;\n    let list = [];\n    try {\n      const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=0&limit=6&countrycodes=us&q=' + encodeURIComponent(q), { headers: { Accept: 'application/json' } });\n      const data = await r.json();\n      if (Array.isArray(data)) list = data.map(d => ({ label: String(d.display_name || '').replace(/,\\s*United States$/, ''), lat: parseFloat(d.lat), lng: parseFloat(d.lon) }));\n    } catch (e) {}\n    if (seq !== this._suggestSeq) return;\n    this.setState({ suggestions: list, suggestLoading: false });\n  }\n  pickSuggestion(s) {\n    clearTimeout(this._suggestTimer);\n    this._suggestSeq++;\n    this.setForm({ address: s.label, pickedLat: s.lat, pickedLng: s.lng });\n    this.setState({ suggestions: [], suggestLoading: false, addressFocused: false });\n  }\n  onPrice(e) { const v = e.target.value; this.setForm({ price: v }); }\n  onUrl(e) { const v = e.target.value; this.setForm({ url: v }); }\n  onFormKey(e) {\n    if (e.key !== 'Enter') return;\n    if (e.target.dataset && e.target.dataset.addr === '1' && this.state.suggestions && this.state.suggestions.length) {\n      e.preventDefault();\n      this.pickSuggestion(this.state.suggestions[0]);\n      return;\n    }\n    if (e.target.tagName === 'INPUT') { e.preventDefault(); if (!this.state.geocoding) this.submit(); }\n  }\n  onAgentEmail(e) { const v = e.target.value; this.setForm({ agentEmail: v }); }\n  onAgentPhone(e) { const v = e.target.value; this.setForm({ agentPhone: v }); }\n  normalizeUrl(u) { u = (u || '').trim(); if (!u) return ''; return /^https?:\\/\\//i.test(u) ? u : 'https://' + u; }\n  onNotes(e) { const v = e.target.value; this.setForm({ notes: v }); }\n  toggleWork() { const d = Object.assign({}, this.state.form.distWork); d.ok = !d.ok; this.setForm({ distWork: d }); }\n  toggleGrocery() { const d = Object.assign({}, this.state.form.distGrocery); d.ok = !d.ok; this.setForm({ distGrocery: d }); }\n  onWorkText(e) { const v = e.target.value; const d = Object.assign({}, this.state.form.distWork); d.text = v; this.setForm({ distWork: d }); }\n  onGroceryText(e) { const v = e.target.value; const d = Object.assign({}, this.state.form.distGrocery); d.text = v; this.setForm({ distGrocery: d }); }\n  incBeds() { this.setForm({ beds: Math.min(20, this.state.form.beds + 1) }); }\n  decBeds() { this.setForm({ beds: Math.max(0, this.state.form.beds - 1) }); }\n  incBaths() { this.setForm({ baths: Math.min(20, this.state.form.baths + 1) }); }\n  decBaths() { this.setForm({ baths: Math.max(0, this.state.form.baths - 1) }); }\n  setStatus(k) { this.setForm({ status: k }); }\n  toggleAmenity(k) { const a = Object.assign({}, this.state.form.amenities); a[k] = !a[k]; this.setForm({ amenities: a }); }\n  setStars(who, n) {
